{% extends "base_public.html" %}
{% load static %}

{% block title %}Nueva Devolución - Administración{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0"><i class="bi bi-arrow-return-left"></i> Nueva Devolución de Compra</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="compra_id" class="form-label">Compra <span class="text-danger">*</span></label>
                            <select class="form-select" id="compra_id" name="compra_id" required onchange="actualizarProductos()">
                                <option value="">-- Seleccionar Compra --</option>
                                {% for compra in compras %}
                                <option value="{{ compra.id }}" data-proveedor="{{ compra.proveedor.nombre }}" data-fecha="{{ compra.fecha|date:'d/m/Y' }}">
                                    Compra #{{ compra.id }} - {{ compra.proveedor.nombre }} ({{ compra.fecha|date:'d/m/Y' }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="producto_id" class="form-label">Producto <span class="text-danger">*</span></label>
                            <select class="form-select" id="producto_id" name="producto_id" required>
                                <option value="">-- Seleccionar Producto --</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="cantidad" class="form-label">Cantidad a Devolver <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="cantidad" name="cantidad" min="1" value="1" required>
                        </div>

                        <div class="mb-3">
                            <label for="motivo" class="form-label">Motivo de Devolución</label>
                            <textarea class="form-control" id="motivo" name="motivo" rows="4" placeholder="Describe el motivo de la devolución..."></textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a href="{% url 'inventario:devolucion_lista' %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-check-circle"></i> Registrar Devolución
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function actualizarProductos() {
    // Esta función podría cargar dinámicamente los productos de la compra
    // Por ahora es un placeholder
}
</script>
{% endblock %}
