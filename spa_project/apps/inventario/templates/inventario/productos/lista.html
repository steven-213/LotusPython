<h1>Productos</h1>
<a href="{% url 'inventario:producto_nuevo' %}">Nuevo</a>
<ul>
{% for p in productos %}
  <li>
    {% if p.imagen %}
      <img src="{{ p.imagen }}" alt="Imagen de {{ p.nombre }}" style="width:60px; height:60px; object-fit:cover; vertical-align:middle;">
    {% endif %}
    {{ p.nombre }} - {{ p.stock }}
    <a href="{% url 'inventario:producto_detalle' p.id %}">Detalle</a>
    <a href="{% url 'inventario:producto_editar' p.id %}">Editar</a>
    <form method="post" action="{% url 'inventario:producto_eliminar' p.id %}" style="display:inline;">
      {% csrf_token %}
      <button type="submit">Eliminar</button>
    </form>
  </li>
{% empty %}
  <li>Sin productos</li>
{% endfor %}
</ul>
