{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Producto</title>

<style>

:root {
  --rose-50: #fff6f8;
  --rose-100: #fee7ed;
  --rose-200: #fbcdd9;
  --rose-500: #ca6b86;
  --rose-700: #8b3d56;
  --ink-700: #3b2b32;
  --ink-500: #5a4950;
  --surface: #ffffff;
  --shadow: 0 10px 30px rgba(106, 66, 80, 0.12);
}

body{
  margin: 35px;
  font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(180deg,var(--rose-50) 0%,#fff 40%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* tarjeta */

.form-card{
  background:var(--surface);
  border:1px solid var(--rose-100);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:35px;
  width:420px;
}

/* titulo */

.form-card h1{
  margin-top:0;
  margin-bottom:20px;
  text-align:center;
  color:var(--rose-700);
}

/* inputs */

form{
  display:flex;
  flex-direction:column;
  gap:12px;
}

input, textarea, select{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--rose-200);
  font-size:14px;
  outline:none;
}

textarea{
  resize:none;
  height:80px;
}

input:focus, textarea:focus, select:focus{
  border-color:var(--rose-500);
}

/* boton */

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:999px;
  font-weight:700;
  color:white;
  background:linear-gradient(135deg,var(--rose-500),var(--rose-700));
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.05);
}
.botones{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn-cancelar{
  text-decoration:none;
  padding:12px;
  border-radius:999px;
  text-align:center;
  font-weight:700;
  background:#fff;
  border:1px solid var(--rose-200);
  color:var(--rose-700);
  flex:1;
}

.btn-cancelar:hover{
  background:var(--rose-100);
}

</style>

</head>

<body>

  <div class="form-card">

  <h1>{% if producto %}Editar{% else %}Nuevo{% endif %} producto</h1>

  <form method="post">
  {% csrf_token %}

    <label for="">Nombre</label>
    <input name="nombre"
      value="{{ producto.nombre|default:'' }}"
      placeholder="Nombre del producto">

    <label for="">Nombre</label>
    <textarea name="descripcion"
      placeholder="Descripción del producto">{{ producto.descripcion|default:'' }}</textarea>

    <label for="">Stock</label>
    <input name="stock"
      type="number"value="{{ producto.stock|default:0 }}"
      placeholder="Stock">

    <label for="">Precio Compra</label>
    <input name="precio_compra"
      type="number"step="0.01"
      value="{{ producto.precio_compra|default:0 }}"placeholder="Precio de compra">

    <label for="">Impuestos</label>
    <select name="impuesto_id">

      <option value="">Seleccione 1</option>

      {% for impu in impuestos %}
      
      <option value="{{ impu.id }}"
      {% if producto.impuesto_id == impu.id %}selected{% endif %}>
      {{ impu.nombre }} ({{ impu.porcentaje }}%)
      </option>

      {% endfor %}

    </select>

    <label for="">Precio Venta</label>
    <input name="precio_venta"value="{{ producto.precio_venta|default:0 }}"readonly>

    <label for="">Proveedor</label>
      


    <button type="submit">Guardar producto</button>
    <div class="botones">
      <a class="btn-cancelar" href="{% url 'inventario:producto_lista' %}">Salir</a>
    </div>

  </form>

  </div>

</body>
</html>
