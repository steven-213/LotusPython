<h1>{% if producto %}Editar{% else %}Nuevo{% endif %} producto</h1>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}

  <div>
    <label for="nombre">Nombre</label>
    <input id="nombre" name="nombre" value="{{ producto.nombre|default:'' }}" placeholder="Nombre del producto" required>
  </div>

  <div>
    <label for="descripcion">Descripcion</label>
    <textarea id="descripcion" name="descripcion" placeholder="Describe el producto">{{ producto.descripcion|default:'' }}</textarea>
  </div>

  <div>
    <label for="imagen">Imagen</label>
    {% if producto and producto.imagen %}
      <div>
        <img src="{{ producto.imagen }}" alt="Imagen de {{ producto.nombre }}" style="max-width: 220px; height: auto;">
        <p>Sube otra imagen si quieres reemplazarla.</p>
      </div>
    {% endif %}
    <input id="imagen" type="file" name="imagen" accept="image/*">
  </div>

  <div>
    <label for="stock">Stock</label>
    <input id="stock" name="stock" type="number" min="0" value="{{ producto.stock|default:0 }}">
  </div>

  <div>
    <label for="precio_compra">Precio compra</label>
    <input id="precio_compra" name="precio_compra" type="number" step="0.01" min="0" value="{{ producto.precio_compra|default:0 }}">
  </div>

  <div>
    <label for="precio_venta">Precio venta</label>
    <input id="precio_venta" name="precio_venta" type="number" step="0.01" min="0" value="{{ producto.precio_venta|default:0 }}">
  </div>

  <div>
    <label for="iva">IVA (%)</label>
    <input id="iva" name="iva" type="number" step="0.01" min="0" value="{{ producto.iva|default:0 }}">
  </div>

  <div>
    <label for="proveedor_id">Proveedor</label>
    <select id="proveedor_id" name="proveedor_id">
      <option value="">Sin proveedor</option>
      {% for prov in proveedores %}
      <option value="{{ prov.id }}" {% if producto.proveedor_id == prov.id %}selected{% endif %}>{{ prov.nombre }}</option>
      {% endfor %}
    </select>
  </div>

  <button type="submit">Guardar</button>
</form>
