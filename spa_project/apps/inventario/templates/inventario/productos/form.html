<h1>{% if producto %}Editar{% else %}Nuevo{% endif %} producto</h1>
<form method="post">{% csrf_token %}
  <input name="nombre" value="{{ producto.nombre|default:'' }}" placeholder="Nombre">
  <textarea name="descripcion">{{ producto.descripcion|default:'' }}</textarea>
  <input name="stock" type="number" value="{{ producto.stock|default:0 }}">
  <input name="precio_compra" type="number" step="0.01" value="{{ producto.precio_compra|default:0 }}">
  <input name="precio_venta" type="number" step="0.01" value="{{ producto.precio_venta|default:0 }}">
  <input name="iva" type="number" step="0.01" value="{{ producto.iva|default:0 }}">
  <select name="proveedor_id">
    <option value="">Sin proveedor</option>
    {% for prov in proveedores %}
    <option value="{{ prov.id }}" {% if producto.proveedor_id == prov.id %}selected{% endif %}>{{ prov.nombre }}</option>
    {% endfor %}
  </select>
  <button type="submit">Guardar</button>
</form>
