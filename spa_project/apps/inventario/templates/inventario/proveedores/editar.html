{% extends "base_public.html" %}

{% block title %}Editar Proveedor - Administración{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white py-4 d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Proveedor</h4>
                        <p class="mb-0 small mt-2">Actualiza la información del proveedor</p>
                    </div>
                    <a href="{% url 'inventario:proveedor_detalle' proveedor.id %}" class="btn btn-light text-primary">
                        <i class="bi bi-arrow-left"></i> Atrás
                    </a>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <!-- Sección: Información General -->
                        <div class="mb-4">
                            <h6 class="text-primary mb-3 pb-2 border-bottom">
                                <i class="bi bi-info-circle"></i> Información General
                            </h6>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="nombre" class="form-label">
                                        <strong>Nombre <span class="text-danger">*</span></strong>
                                    </label>
                                    <input type="text" class="form-control form-control-lg" id="nombre" name="nombre" value="{{ proveedor.nombre }}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="empresa" class="form-label">
                                        <strong>Empresa</strong>
                                    </label>
                                    <input type="text" class="form-control form-control-lg" id="empresa" name="empresa" value="{{ proveedor.empresa }}">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="nit" class="form-label">
                                        <strong>NIT / Identificación</strong>
                                    </label>
                                    <input type="text" class="form-control form-control-lg" id="nit" name="nit" value="{{ proveedor.nit }}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="pais" class="form-label">
                                        <strong>País</strong>
                                    </label>
                                    <input type="text" class="form-control form-control-lg" id="pais" name="pais" value="{{ proveedor.pais }}">
                                </div>
                            </div>
                        </div>

                        <!-- Sección: Información de Contacto -->
                        <div class="mb-4">
                            <h6 class="text-primary mb-3 pb-2 border-bottom">
                                <i class="bi bi-telephone"></i> Información de Contacto
                            </h6>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="telefono" class="form-label">
                                        <strong>Teléfono</strong>
                                    </label>
                                    <input type="tel" class="form-control form-control-lg" id="telefono" name="telefono" value="{{ proveedor.telefono }}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="correo" class="form-label">
                                        <strong>Correo Electrónico</strong>
                                    </label>
                                    <input type="email" class="form-control form-control-lg" id="correo" name="correo" value="{{ proveedor.correo }}">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="direccion" class="form-label">
                                    <strong>Dirección</strong>
                                </label>
                                <input type="text" class="form-control form-control-lg" id="direccion" name="direccion" value="{{ proveedor.direccion }}">
                            </div>
                        </div>

                        <!-- Botones de Acción -->
                        <div class="d-flex gap-2 justify-content-end mt-5 pt-3 border-top">
                            <a href="{% url 'inventario:proveedor_lista' %}" class="btn btn-lg btn-outline-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-lg btn-primary">
                                <i class="bi bi-check-circle"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
