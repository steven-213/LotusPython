<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Servicio</title>
    <link rel="stylesheet" href="/css/dashboard/productos/actualizar.css">
</head>
<body>

<h2>Actualizar Servicio</h2>

<form th:action="@{/servicios/actualizar}" th:object="${servicio}" method="post">

    <input type="hidden" th:field="*{id}">

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" required><br>

    <label>Precio:</label>
    <input type="number" th:field="*{precio}" step="0.01" required><br>

    <label>Descripción:</label>
    <textarea th:field="*{descripcion}" required></textarea><br>

    <label>Imagen:</label>
    <select th:field="*{imagen.id}">
        <option th:each="img : ${imagenes}"
                th:value="${img.id}"
                th:text="${img.nombre}">
        </option>
    </select>

    <button type="submit">Actualizar</button>
</form>
<a href="javascript:history.back()" class="btn-back">← Volver</a>
</body>
</html>
