<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calendario de Citas</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="{% static 'css/dashboard/calendario_style.css' %}">
</head>

<body>

<div class="container mt-5">
    <h3 class="text-center mb-4" style="background-color: #ffc0cb;">Calendario de Citas</h3>

    <div id="calendar"
         data-store-url="/api/calendar"
         data-update-base="/api/calendar"></div>
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>

/* ====================== Funciones Auxiliares ====================== */

function formatForMySQL(date) {
    if (!date) return null;

    const d = new Date(date);

    return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0') + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' +
        String(d.getMinutes()).padStart(2,'0') + ':' +
        String(d.getSeconds()).padStart(2,'0');
}


async function fetchJson(url, method, payload) {

    const response = await fetch(url,{
        method: method,
        headers:{
            'Content-Type':'application/json'
        },
        body: payload ? JSON.stringify(payload) : null
    });

    if(!response.ok){
        throw new Error("Error en la petición");
    }

    return await response.json();
}



/* ====================== Calendario ====================== */

document.addEventListener('DOMContentLoaded', async function() {

    const calendarEl = document.getElementById('calendar');

    const storeUrl = calendarEl.getAttribute('data-store-url');
    const updateBaseUrl = calendarEl.getAttribute('data-update-base');

    let events = [];

    try{
        events = await fetchJson(storeUrl,'GET');
    }catch(error){
        console.log(error);
    }


    const calendar = new FullCalendar.Calendar(calendarEl,{

        initialView:'timeGridWeek',
        editable:true,
        selectable:true,
        events:events,
        height:700,
        locale:'es',

        headerToolbar:{
            left:'prev,next today',
            center:'title',
            right:'dayGridMonth,timeGridWeek,timeGridDay'
        },

        buttonText:{
            today:'Hoy',
            month:'Mes',
            week:'Semana',
            day:'Día'
        },


        dateClick:function(info){
            if(info.view.type === 'dayGridMonth'){
                calendar.changeView('timeGridDay',info.dateStr);
            }
        },


        select: async function(info){

            const result = await Swal.fire({
                title:'Nuevo evento',
                input:'text',
                inputLabel:'Nombre del evento',
                showCancelButton:true
            });

            if(!result.value) return;

            const payload = {
                title: result.value,
                startDate: formatForMySQL(info.start),
                endDate: formatForMySQL(info.end),
                allDay: info.allDay
            };

            try{

                const data = await fetchJson(storeUrl,'POST',payload);

                calendar.addEvent({
                    id:data.id,
                    title:data.title,
                    start:data.startDate,
                    end:data.endDate
                });

                Swal.fire('Creado','Evento creado correctamente','success');

            }catch(e){

                Swal.fire('Error','No se pudo crear','error');

            }

        }

    });


    calendar.render();

});

</script>


<a href="javascript:history.back()" class="btn-back">← Volver</a>

</body>
</html>
