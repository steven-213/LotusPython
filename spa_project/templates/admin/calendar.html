{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendario de Citas</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- CSS -->
<link rel="stylesheet" href="{% static 'css/dashboard/calendario_style.css' %}">

</head>

<body>

<div class="container mt-5">

<h3 class="text-center mb-4" style="background-color:#ffc0cb;">
Calendario de Citas
</h3>

<div id="calendar"
     data-store-url="/api/calendar"
     data-update-base="/api/calendar">
</div>

</div>

<a href="javascript:history.back()" class="btn-back">← Volver</a>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>

/* ====================== Funciones Auxiliares ====================== */

function formatForMySQL(date) {

    if (!date) return null;

    const d = new Date(date);

    return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0') + ' ' +
        String(d.getHours()).padStart(2,'0') + ':' +
        String(d.getMinutes()).padStart(2,'0') + ':' +
        String(d.getSeconds()).padStart(2,'0');

}

async function fetchJson(url, method, payload) {

    const response = await fetch(url,{
        method:method,
        headers:{
            'Content-Type':'application/json'
        },
        body: payload ? JSON.stringify(payload) : null
    });

    if(!response.ok){

        const err = await response.json().catch(()=>({message:'Error'}));
        throw new Error(err.message);

    }

    return await response.json();

}


/* ====================== CALENDARIO ====================== */

document.addEventListener('DOMContentLoaded', async function(){

const calendarEl = document.getElementById('calendar');

const storeUrl = calendarEl.getAttribute('data-store-url');
const updateBaseUrl = calendarEl.getAttribute('data-update-base');


let events = [];

try{

events = await fetchJson(storeUrl,'GET');

}catch(error){

console.error(error);

}


const calendar = new FullCalendar.Calendar(calendarEl,{

initialView:'timeGridWeek',

editable:true,

selectable:true,

events:events,

height:700,

locale:'es',

headerToolbar:{
left:'prev,next today',
center:'title',
right:'dayGridMonth,timeGridWeek,timeGridDay'
},

buttonText:{
today:'Hoy',
month:'Mes',
week:'Semana',
day:'Día'
},

slotLabelFormat:{
hour:'2-digit',
minute:'2-digit',
hour12:true
},

eventTimeFormat:{
hour:'2-digit',
minute:'2-digit',
hour12:true
},


/* CLICK DIA */

dateClick:function(info){

if(info.view.type==='dayGridMonth'){

calendar.changeView('timeGridDay',info.dateStr)

}

},


/* CREAR EVENTO */

select: async function(info){

const {value:title} = await Swal.fire({

title:'Crear Evento',

input:'text',

inputLabel:'Nombre del evento',

showCancelButton:true

});

if(!title) return;

const payload={

title:title,

startDate:formatForMySQL(info.start),

endDate:formatForMySQL(info.end),

allDay:info.allDay

};

try{

const data = await fetchJson(storeUrl,'POST',payload);

calendar.addEvent({

id:data.id,

title:data.title,

start:data.startDate,

end:data.endDate,

allDay:data.allDay,

color:data.color || '#3788d8'

});

Swal.fire('Creado','Evento creado correctamente','success');

}catch(error){

Swal.fire('Error',error.message,'error');

}

},


/* MOVER EVENTO */

eventDrop: async function(info){

const payload={

startDate:formatForMySQL(info.event.start),

endDate:formatForMySQL(info.event.end),

allDay:info.event.allDay

};

const url = updateBaseUrl + '/' + info.event.id;

try{

await fetchJson(url,'PATCH',payload);

Swal.fire('Actualizado','Evento actualizado','success');

}catch(error){

info.revert();

}

},


/* REDIMENSIONAR */

eventResize: async function(info){

const payload={

startDate:formatForMySQL(info.event.start),

endDate:formatForMySQL(info.event.end),

allDay:info.event.allDay

};

const url = updateBaseUrl + '/' + info.event.id;

try{

await fetchJson(url,'PATCH',payload);

}catch(error){

info.revert();

}

},


/* CLICK EVENTO */

eventClick: async function(info){

const result = await Swal.fire({

title:'Evento',

text:info.event.title,

showDenyButton:true,

showCancelButton:true,

confirmButtonText:'Eliminar',

denyButtonText:'Editar'

});


if(result.isConfirmed){

const url = updateBaseUrl + '/' + info.event.id;

try{

await fetch(url,{method:'DELETE'});

info.event.remove();

Swal.fire('Eliminado','','success');

}catch{

Swal.fire('Error','','error');

}

}

}

});

calendar.render();

});

</script>

</body>
</html>
