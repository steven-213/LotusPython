<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Compra</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Detalle Compra</h2>
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <!-- Lote -->
        <div class="mb-3">
            <label class="form-label">Lote</label>
            <input type="text"
                   name="lote"
                   class="form-control"
                   placeholder="Lote"
                   value="{{ detallecompra.lote|default:'' }}">
        </div>

        <!-- Fecha de Vencimiento -->
        <div class="mb-3">
            <label class="form-label">Fecha de Vencimiento</label>
            <input type="date"
                   name="fechaVencimiento"
                   class="form-control"
                   value="{{ detallecompra.fechaVencimiento|default:'' }}">
        </div>

        <!-- Cantidad -->
        <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number"
                   name="cantidad"
                   class="form-control"
                   placeholder="Cantidad"
                   value="{{ detallecompra.cantidad|default:'' }}"
                   required>
        </div>

        <!-- Valor -->
        <div class="mb-3">
            <label class="form-label">Valor</label>
            <input type="number"
                   step="0.01"
                   name="valor"
                   class="form-control"
                   placeholder="Valor"
                   value="{{ detallecompra.valor|default:'' }}"
                   required>
        </div>

        <input type="hidden" name="unCompra_id" value="{{ compra.id }}">

        <!-- Proveedor -->
        <div class="mb-3">
            <label class="form-label">Proveedor</label>
            <select name="proveedor_id" class="form-control">
                <option value="">Seleccione un proveedor</option>
            {% for proveedor in proveedores %}
                <option value="{{ proveedor.id }}"
            {% if detallecompra.proveedor and detallecompra.proveedor.id == proveedor.id %}selected{% endif %}>
                {{ proveedor.nombre }}
            </option>
        {% endfor %}
            </select>
        </div>

        <!-- Producto -->
        <div class="mb-3">
            <label class="form-label">Producto</label>
            <select name="unProducto_id" class="form-control" required>
                <option value="">Seleccione un producto</option>
                {% for producto in productos %}
                    <option value="{{ producto.id }}"
                        {% if detallecompra.unProducto and detallecompra.unProducto.id == producto.id %}selected{% endif %}>
                        {{ producto.nombre }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'finalizar_compra' compra.id %}" class="btn btn-success">
            Finalizar Compra
        </a>
        <a href="{% url 'vista' %}" class="btn btn-success">
            Volver
        </a>
    </form>
</div>
</body>
</html>
