<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de empleados</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TU CSS -->
    <style>
        body {
            font-family: "Helvetica Neue", sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background: #fce4ec;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .navbar h3 {
            color: rgb(231, 104, 125);
            font-size: 24px;
        }

        .navbar ul {
            display: flex;
            gap: 15px;
            list-style: none;
        }

        .navbar a {
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }

        .container {
            padding: 30px;
        }

        .card {
            background-color: #f9f9f9;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.12);
        }

        .card-header {
            font-size: 24px;
            color: rgb(231, 104, 125);
            margin-bottom: 20px;
        }

        .acciones {
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background-color: pink;
            color: #333;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-right: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #ff6f91;
            transform: scale(1.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #e7e7e7;
            padding: 12px;
            text-align: center;
        }

        thead {
            background-color: #fce4ec;
            color: rgb(231, 104, 125);
        }
    </style>
</head>

<body>

<!-- NAVBAR solo visual -->
<div class="navbar">
    <h3>Administrador</h3>
    <ul>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/listar">Empleados</a></li>
        <li><a href="/logout">Cerrar sesión</a></li>
    </ul>
</div>

<div class="container">
    <div class="card">

        <div class="card-header" th:text="${titulo}">Listado de empleados</div>

        <div class="acciones">
            <a th:href="@{/form}" class="btn">Agregar Empleado</a>
            <a th:href="@{/exportarExcel}" class="btn">Exportar Excel</a>
        </div>

        <!-- ✅ Thymeleaf solo para datos -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Email</th>
                    <th>Fecha</th>
                    <th>Telefono</th>
                    <th>Sexo</th>
                    <th>Salario</th>
                    <th>Detalles</th>
                    <th>Editar</th>
                    <th>Eliminar</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="empleado : ${empleados}">
                    <td th:text="${empleado.id}">1</td>
                    <td th:text="${empleado.nombre}">Nombre</td>
                    <td th:text="${empleado.apellido}">Apellido</td>
                    <td th:text="${empleado.email}">email@email.com</td>
                    <td th:text="${empleado.fecha}">2025-01-01</td>
                    <td th:text="${empleado.telefono}">123</td>
                    <td th:text="${empleado.sexo}">M</td>
                    <td th:text="${empleado.salario}">1000</td>

                    <td>
                        <a th:href="@{/ver/{id}(id=${empleado.id})}" class="btn">Ver</a>
                    </td>
                    <td>
                        <a th:href="@{/form/{id}(id=${empleado.id})}" class="btn">Editar</a>
                    </td>
                    <td>
                        <a th:href="@{/eliminar/{id}(id=${empleado.id})}"
                           class="btn"
                           onclick="return confirm('¿Seguro de eliminar?')">
                            Eliminar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
