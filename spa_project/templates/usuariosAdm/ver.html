<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Detalle del Empleado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/global_style.css"> <!-- CSS global -->
    <style>
        body {
            font-family: "Helvetica Neue", sans-serif;
            background-color: #fff;
            margin: 0;
            padding: 0;
        }

        /* ===== NAVBAR MODERNA ===== */
        .nav-container {
            background: #fce4ec;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .nav-container .logo img {
            height: 40px;
            transition: transform 0.2s ease, filter 0.2s ease;
            cursor: pointer;
        }

        .nav-container .logo img:hover {
            transform: scale(1.08);
            filter: brightness(1.1);
        }

        .nav-container ul {
            display: flex;
            gap: 20px;
            list-style: none;
            margin: 0;
        }

        .nav-container ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        .nav-container ul li a:hover {
            color: rgb(231, 104, 125);
        }

        /* ===== CARD DETALLE ===== */
        .container {
            padding: 40px 20px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background-color: #f9f9f9;
            border-radius: 15px;
            padding: 25px 20px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.12);
        }

        .card-header {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: rgb(231, 104, 125);
            margin-bottom: 20px;
        }

        .list-group {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .list-group-item {
            background-color: #fff0f5;
            border-radius: 10px;
            margin-bottom: 10px;
            padding: 12px 15px;
            font-size: 16px;
            color: #333;
        }

        .list-group-item.active {
            background-color: #ffb6c1;
            color: #333;
            font-weight: bold;
            text-align: center;
        }

        .volver {
            display: block;
            margin-top: 20px;
            text-align: center;
            text-decoration: none;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="nav-container">
    <div class="logo">
        <img src="/img/logo.png" alt="Logo SPA"> 
    </div>
    <ul>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/listar">Empleados</a></li>
        <li><a href="/logout">Cerrar sesión</a></li>
    </ul>
</div>

<div class="container">
    <div class="card">

        <div class="card-header" th:text="${titulo}">Detalle</div>

        <ul class="list-group">
            <li class="list-group-item active" th:text="${empleado.nombre}">Nombre</li>
            <li class="list-group-item" th:text="${empleado.apellido}">Apellido</li>
            <li class="list-group-item" th:text="${empleado.email}">Email</li>
            <li class="list-group-item" th:text="${empleado.fecha}">Fecha</li>
            <li class="list-group-item" th:text="${empleado.telefono}">Teléfono</li>
            <li class="list-group-item" th:text="${empleado.sexo}">Sexo</li>
            <li class="list-group-item" th:text="${empleado.salario}">Salario</li>
        </ul>

        <a href="/listar" class="volver">← Volver al listado</a>

    </div>
</div>

</body>
</html>
