<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paginación</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        .pagination {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 0;
            margin: 30px 0;
            gap: 8px;
        }

        .page-item {
            border-radius: 8px;
            overflow: hidden;
        }

        .page-link {
            display: block;
            padding: 10px 14px;
            background-color: #fce4ec;
            color: rgb(231, 104, 125);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .page-item.active .page-link {
            background-color: #ff9aa2;
            color: white;
        }

        .page-item.disabled .page-link {
            background-color: #eee;
            color: #aaa;
            pointer-events: none;
        }

        .page-link:hover {
            background-color: #ffb6c1;
            color: #333;
        }
    </style>
</head>
<body>

<!-- ✅ Solo Thymeleaf para la lógica -->
<nav>
    <ul class="pagination">

        <li class="page-item"
            th:classappend="${page.first} ? ' disabled'">
            <span class="page-link" th:if="${page.first}">Primera</span>
            <a class="page-link" th:if="${not page.first}"
               th:href="@{${page.url}(page=0)}">Primera</a>
        </li>

        <li class="page-item"
            th:classappend="${not page.hasPrevius} ? ' disabled'">
            <span class="page-link" th:if="${not page.hasPrevius}">&laquo;</span>
            <a class="page-link" th:if="${page.hasPrevius}"
               th:href="@{${page.url}(page=${page.paginaActual - 2})}">&laquo;</a>
        </li>

        <li class="page-item"
            th:each="item : ${page.paginas}"
            th:classappend="${item.actual} ? ' active'">
            <span class="page-link"
                  th:if="${item.actual}"
                  th:text="${item.numero}">1</span>
            <a class="page-link"
               th:if="${not item.actual}"
               th:href="@{${page.url}(page=${item.numero - 1})}"
               th:text="${item.numero}">1</a>
        </li>

        <li class="page-item"
            th:classappend="${not page.hasNext} ? ' disabled'">
            <span class="page-link" th:if="${not page.hasNext}">&raquo;</span>
            <a class="page-link" th:if="${page.hasNext}"
               th:href="@{${page.url}(page=${page.paginaActual})}">&raquo;</a>
        </li>

        <li class="page-item"
            th:classappend="${page.last} ? ' disabled'">
            <span class="page-link" th:if="${page.last}">Última</span>
            <a class="page-link" th:if="${not page.last}"
               th:href="@{${page.url}(page=${page.totalPaginas - 1})}">Última</a>
        </li>

    </ul>
</nav>

</body>
</html>
